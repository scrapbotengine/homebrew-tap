name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tap repository
        run: brew tap scrapbotengine/tap "$PWD"

      - name: Audit formulae
        run: |
          set -euo pipefail

          formulae=(Formula/*.rb)
          if [ ! -e "${formulae[0]}" ]; then
            echo "No formulae to audit yet."
            exit 0
          fi

          for formula in "${formulae[@]}"; do
            brew audit --formula "$formula"
          done
