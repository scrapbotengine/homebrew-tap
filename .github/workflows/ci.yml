name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tap repository
        run: brew tap scrapbotengine/tap "$PWD"

      - name: Audit casks
        run: |
          set -euo pipefail

          casks=(Casks/*.rb)
          if [ ! -e "${casks[0]}" ]; then
            echo "No casks to audit yet."
            exit 0
          fi

          for cask in "${casks[@]}"; do
            brew audit --cask "$cask"
          done
